[graph]
all-features = true

[advisories]
yanked = "warn"
ignore = []

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
exceptions = []

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
skip = [
    # ratatui-core is on hashbrown/foldhash 0.16 while rusqlite/hashlink still anchors 0.15.
    { crate = "foldhash@0.1.5" },
    { crate = "hashbrown@0.15.5" },
    # ring/jsonschema/uuid use getrandom 0.2/0.3 while tempfile currently brings 0.4.
    { crate = "getrandom@0.2.17" },
    { crate = "getrandom@0.4.2" },
    { crate = "r-efi@5.3.0" },
    # copypasta's macOS backend and auto-launch's macOS backend are on different objc2 generations.
    { crate = "objc2@0.5.2" },
    { crate = "objc2-foundation@0.2.2" },
    # ring and dbus-secret-service still anchor older target-specific windows-sys lines.
    { crate = "windows-sys@0.52.0" },
    { crate = "windows-sys@0.59.0" },
]

[bans.workspace-dependencies]
duplicates = "deny"
unused = "warn"
include-path-dependencies = false

[sources]
unknown-registry = "deny"
unknown-git = "deny"
