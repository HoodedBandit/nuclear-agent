name: finalize-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  actions: read

concurrency:
  group: finalize-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  require-ga-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve release commit
        id: release_commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Require successful ga-verify on the release commit
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/require_green_ga.py \
            --repo "${{ github.repository }}" \
            --sha "${{ steps.release_commit.outputs.sha }}" \
            --branch "main"

  finalize:
    needs: require-ga-verify
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      NUCLEAR_SIGNING_HOOK: ${{ secrets.NUCLEAR_ED25519_PRIVATE_KEY != '' && 'python scripts/ed25519_sign_hook.py' || '' }}
      NUCLEAR_SIGNING_KEY_ID: ${{ secrets.NUCLEAR_ED25519_PRIVATE_KEY != '' && 'gha-release' || '' }}
      NUCLEAR_ED25519_PRIVATE_KEY: ${{ secrets.NUCLEAR_ED25519_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo QA tools
        run: |
          cargo install --locked cargo-audit --version 0.22.1
          cargo install --locked cargo-deny --version 0.19.0
          cargo install --locked cargo-outdated --version 0.17.0

      - name: Install Linux release prerequisites
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium (Linux)
        if: runner.os != 'Windows'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium (Windows)
        if: runner.os == 'Windows'
        run: npx playwright install chromium

      - name: Install PyNaCl
        run: python -m pip install pynacl

      - name: Finalize release (Linux)
        if: runner.os != 'Windows'
        run: bash scripts/finalize-release.sh --skip-coding-reference --skip-soak

      - name: Finalize release (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\finalize-release.ps1 -SkipCodingReference -SkipSoak

      - name: Upload release package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: |
            target/release/package
            target/release-records
