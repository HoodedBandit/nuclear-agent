name: ga-verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-ga:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo verification tools
        run: cargo install --locked cargo-audit cargo-deny

      - name: Install Linux verify prerequisites
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Install dashboard app dependencies
        run: npm --prefix ui/dashboard ci

      - name: Install Playwright Chromium (Linux)
        if: runner.os != 'Windows'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium (Windows)
        if: runner.os == 'Windows'
        run: npx playwright install chromium

      - name: Verify GA (Linux)
        if: runner.os != 'Windows'
        run: bash scripts/verify-ga.sh

      - name: Verify GA (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\verify-ga.ps1
